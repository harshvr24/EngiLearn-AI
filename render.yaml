services:
  - type: web
    name: engilearn-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: engilearn-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: engilearn-redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_TEMPERATURE
        value: "0.7"
      - key: LLM_REQUEST_TIMEOUT
        value: "60"
      - key: GROQ_API_KEY
        sync: false

  - type: redis
    name: engilearn-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: engilearn-db
    databaseName: engilearn
    user: engilearn
    plan: free
