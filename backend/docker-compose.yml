services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override datastore hosts to the compose service names.
      DATABASE_URL: postgresql+asyncpg://engilearn:engilearn@postgres:5432/engilearn
      REDIS_URL: redis://redis:6379/0
      # Fast, high-free-tier-limit Groq model for a snappy local UX.
      # Switch to llama-3.3-70b-versatile in .env for higher quality.
      LLM_MODEL: llama-3.1-8b-instant
      # Fewer role-play turns => far fewer/smaller LLM calls => stays under
      # Groq's free-tier tokens-per-minute limit. Raise for richer syllabi.
      SYLLABUS_TURN_LIMIT: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: engilearn
      POSTGRES_PASSWORD: engilearn
      POSTGRES_DB: engilearn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engilearn"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
